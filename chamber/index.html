<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LondriWay C.C Home Page</title>
    <meta name="author" content="Helamã Y. Barbour">
    <meta name="description"
        content="The purpouse of the home page is to help people to know the events, companies, and the weather of Londrina.">
    <meta property="og:title" content="LondriWay Home Page">
    <meta property="og:description"
        content="The purpouse of the home page is to help people to know the events, companies, and the weather of Londrina.">
    <meta property="og:image" content="https://helaman-y-b.github.io/wdd231/chamber/images/park-bridge-large.webp">
    <meta property="og:url" content="https://helaman-y-b.github.io/wdd231/chamber/directory.html">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/index-small.css">
    <link rel="stylesheet" href="styles/index-large.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow+Semi+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <script src="scripts/common-script.js" defer></script>
    <script type="module" src="scripts/script-controller.mjs"></script>
    <script type="module" src="scripts/forecast.mjs"></script>
</head>

<body>
    <header>
        <img src="images/londrin-way-logo.webp" alt="E-commerce logo">
        <span>LondriWay E-commerce</span>
        <button id="menu-toggle" aria-label="Open Menu">
            <img src="images/nav-icon-32x32.png" alt="open navigation symbol">
        </button>
        <nav>
            <button class="close-btn" aria-label="Close Menu">&times;</button>
            <ul>
                <li><a id="selected" href="/">Home</a></li>
                <li><a href="/directory.html">Directory</a></li>
                <li><a href="/">Link</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div id="hero-img">
            <picture>
                <source media="(min-width: 1000px)" srcset="images/lake-photo-large.webp">
                <source media="(min-width: 600px)" srcset="images/lake-photo-medium.webp">
                <source media="(min-width: 300px)" srcset="images/lake-photo-small.webp">

                <img src="images/lake-photo-large.webp" alt="Image of Londrina" loading="lazy">

            </picture>
            <button id="keynotes">Keynote Tickets</button>
        </div>


        <h1>Welcome to Londrina</h1>
        <section id="events">
            <h2>Events</h2>
            <div>
                <p>Event one</p>
                <p>Event two</p>
                <p>Event three</p>
            </div>
        </section>
        <section id="weather">
            <h2>Current Weather</h2>
            <div id="weather-info">
                <img id="weather-icon" src="./images/favicon.ico" alt="Weather icon">
                <ul>
                    <li id="temp"></li>
                    <li id="weather-stat"></li>
                    <li id="highest"></li>
                    <li id="lowest"></li>
                    <li id="humidity"></li>
                    <li id="sunrise"></li>
                    <li id="sunset"></li>
                </ul>
            </div>
        </section>
        <section id="forecast">
            <h2>Weather Forecast</h2>
            <div id="forecast-info">
                <p id="today-cast"></p>
                <p id="toworrow-cast"></p>
                <p id="twoday-cast"></p>
            </div>
        </section>
        <section id="business">
            <h2>Our Members</h2>
            <div id="business-info">
                <div id="members-container">
                    <!--Members goes here-->
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; <span id="currentYear"></span> - Helamã Y. Barbour - PR/BR</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
